name: spring-starter-template

services:
  db:
    image: postgres:17
    container_name: spring-database
    environment:
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: mydb
    ports:
      - 5432:5432

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.13
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elk-network
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.13
    ports:
      - "5001:5000"
    volumes:
      - ./logstash.yaml:/usr/share/logstash/config/logstash.yml
      - ./:/usr/share/logstash/config
      - ./app/logs:/usr/share/logstash/logs
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    command: [ "-f", "/usr/share/logstash/config/logstash.conf" ]
    depends_on:
      - elasticsearch
    networks:
      - elk-network

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.13
    ports:
      - "5601:5601"
    depends_on:
      - logstash
    networks:
      - elk-network

networks:
  elk-network:
    driver: bridge